name: Build LumiaLinux ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build ISO in privileged Arch container
        run: |
          docker run --privileged --rm \
            -v $PWD:/build \
            -w /build \
            archlinux:latest bash -c "
              pacman -Sy --noconfirm archiso &&
              mkarchiso -v -w /tmp/work -o /build .
            "
          ls -lah
          find . -name "*.iso" 2>/dev/null

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: LumiaLinux-ISO
          path: "*.iso"
          retention-days: 7

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: "*.log"
