name: Build LumiaLinux ARM64 (aarch64 glibc)

on:
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ARM64 ISO
        run: |
          docker run --privileged --rm \
            --platform linux/arm64 \
            -v $PWD:/build \
            -w /build \
            menci/archlinuxarm:latest bash -c "
              pacman -Sy --noconfirm --overwrite '*' git base-devel python-docutils &&
              git clone https://gitlab.archlinux.org/archlinux/archiso.git /tmp/archiso &&
              cd /tmp/archiso &&
              make install &&
              cd /build &&
              sed -i 's/x86_64/aarch64/' profiledef.sh &&
              mkarchiso -v -w /tmp/work -o /build .
            "
          ls -lah
          find . -name "*.iso" 2>/dev/null

      - name: Upload ARM64 ISO
        uses: actions/upload-artifact@v4
        with:
          name: LumiaLinux-aarch64-glibc
          path: "*.iso"
          retention-days: 7

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: arm64-build-log
          path: "*.log"
# ARM64 build
